services:
  adaptalloc:
    build: .
    image: adaptalloc:latest
    container_name: adaptalloc_demo
    ports:
      - "8501:8501"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./outputs:/app/outputs
      - ./data:/app/data
    environment:
      - YOLO_WEIGHTS=${YOLO_WEIGHTS:-data/models/yolo_cracks.pt}
      - RTDETR_PATH=${RTDETR_PATH:-data/models/rtdetr_folder}
      - ENERGY_ALPHA=${ENERGY_ALPHA:-0.40}
      - CONF_THRESH=${CONF_THRESH:-0.25}
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
    restart: unless-stopped

  baseline:
    build: .
    image: adaptalloc:latest
    container_name: adaptalloc_baseline
    command: >
      python baseline_compare.py
        --yolo ${YOLO_WEIGHTS:-data/models/yolo_cracks.pt}
        --rtdetr ${RTDETR_PATH:-data/models/rtdetr_folder}
        --output /app/outputs
        --max-frames 200
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./outputs:/app/outputs
      - ./data:/app/data
    environment:
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
    profiles:
      - baseline
